<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SimpleStaff</title>
  <style>
    :root {
      --cds-interactive-01: #0f62fe;
      --cds-text-01: #161616;
      --cds-text-02: #525252;
      --cds-ui-02: #ffffff;
      --cds-field-01: #f4f4f4;
      --cds-support-02: #198038;
      --cds-support-01: #da1e28;
      --cds-border-subtle: #e0e0e0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px; line-height: 1.5; color: var(--cds-text-01);
      background: var(--cds-ui-02); padding: 2rem;
    }
    .page-header { margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--cds-border-subtle); }
    .page-header h1 { font-size: 1.75rem; font-weight: 400; margin-bottom: 0.25rem; }
    .page-header p { color: var(--cds-text-02); font-size: 0.875rem; }
    .card { background: var(--cds-ui-02); border: 1px solid var(--cds-border-subtle); padding: 1.5rem; margin-bottom: 1.5rem; }
    .card h2 { font-size: 1.125rem; font-weight: 600; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--cds-text-02); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.32px; }
    .form-group input { width: 100%; max-width: 480px; height: 2.5rem; padding: 0 1rem; font-size: 0.875rem; font-family: inherit; color: var(--cds-text-01); background: var(--cds-field-01); border: none; border-bottom: 1px solid var(--cds-border-subtle); outline: none; }
    .form-group input:focus { border-bottom: 2px solid var(--cds-interactive-01); }
    .form-group .helper-text { font-size: 0.75rem; color: var(--cds-text-02); margin-top: 0.25rem; }
    .btn-primary { display: inline-flex; align-items: center; height: 3rem; padding: 0 1.5rem; font-size: 0.875rem; font-family: inherit; color: #fff; background: var(--cds-interactive-01); border: none; cursor: pointer; gap: 0.5rem; }
    .btn-primary:hover { background: #0353e9; }
    .btn-primary:disabled { background: #c6c6c6; color: #8d8d8d; cursor: not-allowed; }
    .notification { display: none; padding: 1rem; margin-bottom: 1.5rem; font-size: 0.875rem; border-left: 3px solid; }
    .notification.success { display: block; background: #defbe6; border-color: var(--cds-support-02); color: #044317; }
    .notification.error { display: block; background: #fff1f1; border-color: var(--cds-support-01); color: #750e13; }
    .notification.loading { display: block; background: #edf5ff; border-color: var(--cds-interactive-01); color: #002d9c; }
    .status-badge { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0.75rem; font-size: 0.75rem; font-weight: 600; border-radius: 100px; }
    .status-badge.configured { background: #defbe6; color: #044317; }
    .status-badge.unconfigured { background: #fff8e1; color: #684e00; }
    .status-badge .dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-badge.configured .dot { background: var(--cds-support-02); }
    .status-badge.unconfigured .dot { background: #f1c21b; }
    .link-row { margin-top: 1rem; }
    .link-row a { color: var(--cds-interactive-01); text-decoration: none; font-size: 0.875rem; }
    .link-row a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>SimpleStaff</h1>
    <p>Intelligente Schichtplanung und ArbZG-Validierung</p>
  </div>

  <div id="notification" class="notification"></div>

  <div class="card">
    <h2>Status
      <span id="statusBadge" class="status-badge unconfigured">
        <span class="dot"></span>
        <span id="statusText">Nicht konfiguriert</span>
      </span>
    </h2>
    <div class="link-row" id="appLink" style="display:none">
      <a id="appUrl" href="#" target="_blank">&#x2192; SimpleStaff öffnen</a>
    </div>
  </div>

  <div class="card">
    <h2>Konfiguration</h2>
    <form id="configForm">
      <div class="form-group">
        <label for="domain_name">Domain Name</label>
        <input type="text" id="domain_name" placeholder="z.B. time.bls-isp.net" required>
        <div class="helper-text">FQDN unter der SimpleStaff erreichbar ist (HTTPS mit Let's Encrypt)</div>
      </div>
      <div class="form-group">
        <label for="super_admin_email">Super Admin E-Mail</label>
        <input type="email" id="super_admin_email" placeholder="z.B. admin@firma.de" required>
        <div class="helper-text">E-Mail-Adresse für den Super-Administrator</div>
      </div>
      <div class="form-group">
        <label for="super_admin_password">Super Admin Passwort</label>
        <input type="password" id="super_admin_password" placeholder="Mindestens 6 Zeichen" required minlength="6">
        <div class="helper-text">Passwort für den Super-Administrator</div>
      </div>
      <button type="submit" class="btn-primary" id="saveBtn">Konfiguration speichern</button>
    </form>
  </div>

  <script>
    // ========================================
    // NS8 Module UI - Core Integration
    // ========================================

    // Get the module instance ID from the URL path
    // NS8 loads module UI at: /cluster-admin/apps/{module_id}/
    const pathSegments = window.location.pathname.replace(/\/+$/, '').split('/');
    const moduleId = pathSegments[pathSegments.length - 1];

    // Access the NS8 core via the parent iframe bridge
    let coreRoot = null;
    let apiUrl = '';
    let authToken = '';

    try {
      // The NS8 core exposes itself as window.parent.ns8Core
      const ns8Core = window.parent.ns8Core;
      if (ns8Core && ns8Core.$root) {
        coreRoot = ns8Core.$root;
        // The core provides the API URL and JWT token
        apiUrl = coreRoot.apiUrl || coreRoot.$data.apiUrl || '';
        authToken = coreRoot.token || coreRoot.$data.token || '';
      }
    } catch (e) {
      console.warn('Cannot access NS8 core:', e);
    }

    // Fallback: try to discover API URL if core access failed
    if (!apiUrl) {
      // NS8 API server listens on port 9311 on the leader node
      apiUrl = window.location.origin + '/api/';
    }

    function getHeaders() {
      const h = { 'Content-Type': 'application/json' };
      if (authToken) h['Authorization'] = 'Bearer ' + authToken;
      return h;
    }

    function showNotification(type, message) {
      const el = document.getElementById('notification');
      el.className = 'notification ' + type;
      el.textContent = message;
      if (type === 'success') setTimeout(() => { el.className = 'notification'; }, 8000);
    }

    function updateStatus(configured, domain) {
      const badge = document.getElementById('statusBadge');
      const text = document.getElementById('statusText');
      const linkRow = document.getElementById('appLink');
      const appUrl = document.getElementById('appUrl');
      if (configured && domain) {
        badge.className = 'status-badge configured';
        text.textContent = 'Konfiguriert';
        appUrl.href = 'https://' + domain;
        appUrl.textContent = '\u2192 ' + domain + ' öffnen';
        linkRow.style.display = 'block';
      } else {
        badge.className = 'status-badge unconfigured';
        text.textContent = 'Nicht konfiguriert';
        linkRow.style.display = 'none';
      }
    }

    // Submit a task to the NS8 cluster API and wait for completion
    async function submitTask(action, data) {
      // NS8 task submission endpoint
      const taskPayload = {
        action: action,
        data: data,
        extra: {
          title: 'SimpleStaff: ' + action,
          isNotificationHidden: false,
        },
      };

      const resp = await fetch(apiUrl + 'module/' + moduleId + '/tasks', {
        method: 'POST',
        headers: getHeaders(),
        body: JSON.stringify(taskPayload),
      });

      if (!resp.ok) {
        const errorText = await resp.text();
        throw new Error('HTTP ' + resp.status + ': ' + errorText);
      }

      const result = await resp.json();
      const taskId = result.data && result.data.id;
      if (!taskId) return result;

      // Poll for task completion
      for (let i = 0; i < 60; i++) {
        await new Promise(r => setTimeout(r, 2000));
        try {
          const statusResp = await fetch(apiUrl + 'module/' + moduleId + '/tasks/' + taskId + '/status', {
            headers: getHeaders(),
          });
          if (statusResp.ok) {
            const statusData = await statusResp.json();
            if (statusData.data && statusData.data.exit_code !== undefined) {
              return statusData.data;
            }
          }
        } catch (e) { /* keep polling */ }
      }
      throw new Error('Task timeout');
    }

    // Load current configuration
    async function loadConfiguration() {
      try {
        const result = await submitTask('get-configuration', {});
        if (result && result.output) {
          const config = result.output;
          if (config.domain_name) {
            document.getElementById('domain_name').value = config.domain_name;
            document.getElementById('super_admin_email').value = config.super_admin_email || '';
            updateStatus(true, config.domain_name);
          }
        }
      } catch (e) {
        console.warn('Could not load configuration:', e);
      }
    }

    // Handle form submission
    document.getElementById('configForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = 'Wird gespeichert...';
      showNotification('loading', 'Konfiguration wird gespeichert und Traefik-Route wird eingerichtet...');

      const data = {
        domain_name: document.getElementById('domain_name').value,
        super_admin_email: document.getElementById('super_admin_email').value,
        super_admin_password: document.getElementById('super_admin_password').value,
      };

      try {
        const result = await submitTask('configure-module', data);
        if (result && result.exit_code === 0) {
          showNotification('success', 'Konfiguration erfolgreich! SimpleStaff ist unter https://' + data.domain_name + ' erreichbar.');
          updateStatus(true, data.domain_name);
        } else {
          const errMsg = (result && result.error) ? result.error : JSON.stringify(result);
          throw new Error(errMsg);
        }
      } catch (e) {
        showNotification('error', 'Fehler: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Konfiguration speichern';
      }
    });

    loadConfiguration();
  </script>
</body>
</html>

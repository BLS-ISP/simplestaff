<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SimpleStaff</title>
  <style>
    :root {
      --cds-interactive-01: #0f62fe;
      --cds-interactive-02: #393939;
      --cds-text-01: #161616;
      --cds-text-02: #525252;
      --cds-ui-01: #f4f4f4;
      --cds-ui-02: #ffffff;
      --cds-field-01: #f4f4f4;
      --cds-support-02: #198038;
      --cds-support-01: #da1e28;
      --cds-border-subtle: #e0e0e0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--cds-text-01);
      background: var(--cds-ui-02);
      padding: 2rem;
    }

    .page-header {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--cds-border-subtle);
    }

    .page-header h1 {
      font-size: 1.75rem;
      font-weight: 400;
      margin-bottom: 0.25rem;
    }

    .page-header p {
      color: var(--cds-text-02);
      font-size: 0.875rem;
    }

    .card {
      background: var(--cds-ui-02);
      border: 1px solid var(--cds-border-subtle);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card h2 {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--cds-text-02);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.32px;
    }

    .form-group input {
      width: 100%;
      max-width: 480px;
      height: 2.5rem;
      padding: 0 1rem;
      font-size: 0.875rem;
      font-family: inherit;
      color: var(--cds-text-01);
      background: var(--cds-field-01);
      border: none;
      border-bottom: 1px solid var(--cds-border-subtle);
      outline: none;
      transition: border-color 0.15s;
    }

    .form-group input:focus {
      border-bottom: 2px solid var(--cds-interactive-01);
    }

    .form-group .helper-text {
      font-size: 0.75rem;
      color: var(--cds-text-02);
      margin-top: 0.25rem;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      height: 3rem;
      padding: 0 4rem 0 1rem;
      font-size: 0.875rem;
      font-family: inherit;
      font-weight: 400;
      color: #fff;
      background: var(--cds-interactive-01);
      border: none;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }

    .btn-primary:hover { background: #0353e9; }
    .btn-primary:active { background: #002d9c; }
    .btn-primary:disabled {
      background: #c6c6c6;
      color: #8d8d8d;
      cursor: not-allowed;
    }

    .btn-primary svg {
      position: absolute;
      right: 1rem;
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .notification {
      display: none;
      padding: 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
      border-left: 3px solid;
    }

    .notification.success {
      display: block;
      background: #defbe6;
      border-color: var(--cds-support-02);
      color: #044317;
    }

    .notification.error {
      display: block;
      background: #fff1f1;
      border-color: var(--cds-support-01);
      color: #750e13;
    }

    .notification.loading {
      display: block;
      background: #edf5ff;
      border-color: var(--cds-interactive-01);
      color: #002d9c;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.25rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 100px;
    }

    .status-badge.configured {
      background: #defbe6;
      color: #044317;
    }

    .status-badge.unconfigured {
      background: #fff8e1;
      color: #684e00;
    }

    .status-badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-badge.configured .dot { background: var(--cds-support-02); }
    .status-badge.unconfigured .dot { background: #f1c21b; }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>SimpleStaff</h1>
    <p>Intelligente Schichtplanung und ArbZG-Validierung</p>
  </div>

  <div id="notification" class="notification"></div>

  <div class="card">
    <h2>Status
      <span id="statusBadge" class="status-badge unconfigured">
        <span class="dot"></span>
        <span id="statusText">Nicht konfiguriert</span>
      </span>
    </h2>
  </div>

  <div class="card">
    <h2>Konfiguration</h2>
    <form id="configForm">
      <div class="form-group">
        <label for="domain_name">Domain Name</label>
        <input type="text" id="domain_name" placeholder="z.B. time.bls-isp.net" required>
        <div class="helper-text">Die FQDN unter der SimpleStaff erreichbar sein soll (HTTPS mit Let's Encrypt)</div>
      </div>

      <div class="form-group">
        <label for="super_admin_email">Super Admin E-Mail</label>
        <input type="email" id="super_admin_email" placeholder="z.B. admin@firma.de" required>
        <div class="helper-text">E-Mail-Adresse für den Super-Administrator-Account</div>
      </div>

      <div class="form-group">
        <label for="super_admin_password">Super Admin Passwort</label>
        <input type="password" id="super_admin_password" placeholder="Mindestens 6 Zeichen" required minlength="6">
        <div class="helper-text">Passwort für den Super-Administrator-Account</div>
      </div>

      <button type="submit" class="btn-primary" id="saveBtn">
        Konfiguration speichern
        <svg viewBox="0 0 32 32"><path d="M28 6H4a2 2 0 00-2 2v16a2 2 0 002 2h24a2 2 0 002-2V8a2 2 0 00-2-2zM4 24V8h24v16z"/><path d="M16 10l-6 6h4v6h4v-6h4l-6-6z"/></svg>
      </button>
    </form>
  </div>

  <script>
    // ========================================
    // NS8 Module UI - API Integration
    // ========================================

    // Determine the module instance ID from the URL path
    // NS8 loads module UI at: /cluster-admin/apps/{module_id}/
    const pathSegments = window.location.pathname.replace(/\/+$/, '').split('/');
    const moduleId = pathSegments[pathSegments.length - 1];

    // NS8 API base URL (same origin)
    const API_BASE = '/cluster-admin/api/';

    // Get authentication token from the parent NS8 core frame
    function getAuthHeaders() {
      let token = '';
      try {
        // NS8 core stores the JWT in localStorage
        token = window.parent.localStorage.getItem('loginToken') || '';
      } catch (e) {
        try {
          token = localStorage.getItem('loginToken') || '';
        } catch (e2) {
          console.warn('Cannot access auth token:', e2);
        }
      }
      return {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json',
      };
    }

    // Show notification
    function showNotification(type, message) {
      const el = document.getElementById('notification');
      el.className = 'notification ' + type;
      el.textContent = message;
      if (type === 'success') {
        setTimeout(() => { el.className = 'notification'; }, 5000);
      }
    }

    // Update status badge
    function updateStatus(configured) {
      const badge = document.getElementById('statusBadge');
      const text = document.getElementById('statusText');
      if (configured) {
        badge.className = 'status-badge configured';
        text.textContent = 'Konfiguriert';
      } else {
        badge.className = 'status-badge unconfigured';
        text.textContent = 'Nicht konfiguriert';
      }
    }

    // Load current configuration from the NS8 agent
    async function loadConfiguration() {
      try {
        const resp = await fetch(API_BASE + 'module/' + moduleId + '/tasks', {
          method: 'POST',
          headers: getAuthHeaders(),
          body: JSON.stringify({
            action: 'get-configuration',
            data: {},
          }),
        });

        if (!resp.ok) throw new Error('API returned ' + resp.status);

        const result = await resp.json();

        // Poll for task result
        if (result && result.data && result.data.id) {
          const taskResult = await pollTask(result.data.id);
          if (taskResult && taskResult.output) {
            const config = taskResult.output;
            if (config.domain_name) {
              document.getElementById('domain_name').value = config.domain_name;
              document.getElementById('super_admin_email').value = config.super_admin_email || '';
              updateStatus(true);
            }
          }
        }
      } catch (e) {
        console.warn('Could not load configuration:', e);
        // Non-critical: form will show empty fields
      }
    }

    // Poll a task until completion
    async function pollTask(taskId) {
      const maxAttempts = 30;
      for (let i = 0; i < maxAttempts; i++) {
        await new Promise(r => setTimeout(r, 1000));
        try {
          const resp = await fetch(API_BASE + 'task/status/' + taskId, {
            headers: getAuthHeaders(),
          });
          if (!resp.ok) continue;
          const result = await resp.json();
          if (result && result.data) {
            const status = result.data.status || result.data.exit_code;
            if (status !== undefined && status !== null) {
              return result.data;
            }
          }
        } catch (e) {
          console.warn('Poll error:', e);
        }
      }
      return null;
    }

    // Handle form submission
    document.getElementById('configForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = 'Speichern...';
      showNotification('loading', 'Konfiguration wird gespeichert...');

      const data = {
        domain_name: document.getElementById('domain_name').value,
        super_admin_email: document.getElementById('super_admin_email').value,
        super_admin_password: document.getElementById('super_admin_password').value,
      };

      try {
        const resp = await fetch(API_BASE + 'module/' + moduleId + '/tasks', {
          method: 'POST',
          headers: getAuthHeaders(),
          body: JSON.stringify({
            action: 'configure-module',
            data: data,
          }),
        });

        if (!resp.ok) throw new Error('API returned ' + resp.status);

        const result = await resp.json();

        // Poll for task completion
        if (result && result.data && result.data.id) {
          const taskResult = await pollTask(result.data.id);
          if (taskResult && taskResult.exit_code === 0) {
            showNotification('success', 'Konfiguration erfolgreich gespeichert! SimpleStaff ist unter https://' + data.domain_name + ' erreichbar.');
            updateStatus(true);
          } else {
            throw new Error('Task failed: ' + JSON.stringify(taskResult));
          }
        } else {
          showNotification('success', 'Konfigurationsauftrag wurde gesendet.');
          updateStatus(true);
        }
      } catch (e) {
        showNotification('error', 'Fehler beim Speichern: ' + e.message);
        console.error('Configure error:', e);
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Konfiguration speichern<svg viewBox="0 0 32 32"><path d="M28 6H4a2 2 0 00-2 2v16a2 2 0 002 2h24a2 2 0 002-2V8a2 2 0 00-2-2zM4 24V8h24v16z"/><path d="M16 10l-6 6h4v6h4v-6h4l-6-6z"/></svg>';
      }
    });

    // Load configuration on page load
    loadConfiguration();
  </script>
</body>
</html>

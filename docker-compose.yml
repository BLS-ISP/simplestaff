services:
  db:
    image: postgres:16-alpine
    container_name: simplestaff-db
    environment:
      POSTGRES_USER: simplestaff
      POSTGRES_PASSWORD: password
      POSTGRES_DB: simplestaff
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:

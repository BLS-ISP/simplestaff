name: Build and Publish Containers

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Downcase repository owner name to prevent registry push failures
      - name: Set lower-case image names in environment
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=${{ env.REGISTRY }}/${OWNER_LOWER}/simplestaff-backend" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=${{ env.REGISTRY }}/${OWNER_LOWER}/simplestaff-frontend" >> $GITHUB_ENV
          echo "MODULE_IMAGE=${{ env.REGISTRY }}/${OWNER_LOWER}/ns8-simplestaff" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. Build & Push Backend Container
      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest

      # 2. Build & Push Frontend Container
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest

      # 3. Build NS8 Module Admin UI (Vue.js)
      - name: Setup Node.js for UI build
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Install UI dependencies
        working-directory: ./ui
        run: yarn install

      - name: Build UI
        working-directory: ./ui
        run: yarn build
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      # 4. Build & Push Nethserver 8 Module Installer Image (includes built UI)
      - name: Build and push Nethserver 8 Module Installer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.MODULE_IMAGE }}:latest
